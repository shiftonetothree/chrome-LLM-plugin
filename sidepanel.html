<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Browser Assistant</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      background: #1a1a2e;
      color: #eee;
    }

    .header {
      padding: 10px 14px;
      background: #16213e;
      border-bottom: 1px solid #0f3460;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .header h1 {
      font-size: 13px;
      font-weight: 600;
      color: #e94560;
    }

    .header-controls {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .debug-btn {
      padding: 4px 8px;
      background: #0f3460;
      border: none;
      border-radius: 4px;
      color: #888;
      font-size: 10px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .debug-btn:hover {
      background: #e94560;
      color: white;
    }

    .status {
      font-size: 10px;
      color: #888;
    }

    .status.ready { color: #4ade80; }
    .status.error { color: #ef4444; }

    .config-section {
      background: #16213e;
      border-bottom: 1px solid #0f3460;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex-shrink: 0;
      max-height: 160px;
      overflow-y: auto;
    }

    .config-row {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .config-row label {
      font-size: 10px;
      color: #888;
      min-width: 45px;
    }

    .config-row select,
    .config-row input {
      flex: 1;
      padding: 5px 8px;
      background: #1a1a2e;
      border: 1px solid #0f3460;
      border-radius: 4px;
      color: #eee;
      font-size: 11px;
    }

    .config-row select:focus,
    .config-row input:focus {
      outline: none;
      border-color: #e94560;
    }

    .config-row select {
      cursor: pointer;
    }

    .custom-endpoint {
      display: none;
    }

    .custom-endpoint.show {
      display: flex;
    }

    .model-row {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .model-row label {
      font-size: 10px;
      color: #888;
      min-width: 45px;
    }

    .model-select {
      flex: 1;
      padding: 5px 8px;
      background: #1a1a2e;
      border: 1px solid #0f3460;
      border-radius: 4px;
      color: #eee;
      font-size: 11px;
    }

    .model-select:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .refresh-models-btn {
      padding: 4px 8px;
      background: #0f3460;
      border: none;
      border-radius: 4px;
      color: #888;
      font-size: 10px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .refresh-models-btn:hover {
      background: #e94560;
      color: white;
    }

    .context-banner {
      background: #0f3460;
      padding: 6px 10px;
      font-size: 10px;
      color: #a5b4fc;
      border-bottom: 1px solid #1e3a5f;
      flex-shrink: 0;
    }

    .context-banner .title {
      font-weight: 600;
      margin-bottom: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .message {
      max-width: 92%;
      padding: 8px 12px;
      border-radius: 10px;
      font-size: 12px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .message.user {
      background: #e94560;
      color: white;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }

    .message.assistant {
      background: #16213e;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
      border: 1px solid #0f3460;
    }

    .message.error {
      background: #dc2626;
      color: white;
      align-self: flex-start;
    }

    .message.loading {
      background: #16213e;
      color: #888;
      align-self: flex-start;
      font-style: italic;
    }

    .loading-indicator {
      display: none;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      font-size: 11px;
      color: #888;
    }

    .loading-indicator.active {
      display: flex;
    }

    .spinner {
      width: 12px;
      height: 12px;
      border: 2px solid #333;
      border-top-color: #e94560;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .input-area {
      padding: 10px;
      background: #16213e;
      border-top: 1px solid #0f3460;
      flex-shrink: 0;
    }

    .input-row {
      display: flex;
      gap: 8px;
    }

    .input-row textarea {
      flex: 1;
      padding: 8px 10px;
      background: #1a1a2e;
      border: 1px solid #0f3460;
      border-radius: 6px;
      color: #eee;
      font-size: 12px;
      resize: none;
      font-family: inherit;
      max-height: 70px;
    }

    .input-row textarea:focus {
      outline: none;
      border-color: #e94560;
    }

    .input-row textarea::placeholder {
      color: #666;
    }

    .send-btn {
      padding: 8px 14px;
      background: #e94560;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      align-self: flex-end;
      transition: background 0.2s;
    }

    .send-btn:hover:not(:disabled) {
      background: #d63d56;
    }

    .send-btn:disabled {
      background: #555;
      cursor: not-allowed;
    }

    /* Debug Modal */
    .debug-modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.85);
      z-index: 1000;
      padding: 16px;
      box-sizing: border-box;
    }

    .debug-modal.active {
      display: flex;
      flex-direction: column;
    }

    .debug-modal h3 {
      color: #e94560;
      font-size: 13px;
      margin-bottom: 8px;
    }

    .debug-modal .debug-content {
      flex: 1;
      background: #1a1a2e;
      border: 1px solid #0f3460;
      border-radius: 6px;
      padding: 10px;
      color: #aaa;
      font-size: 11px;
      line-height: 1.5;
      white-space: pre-wrap;
      overflow-y: auto;
      word-wrap: break-word;
    }

    .debug-modal .debug-actions {
      display: flex;
      gap: 8px;
      margin-top: 8px;
      justify-content: flex-end;
    }

    .debug-modal button {
      padding: 6px 14px;
      border: none;
      border-radius: 4px;
      font-size: 11px;
      cursor: pointer;
    }

    .debug-modal .close-btn {
      background: #555;
      color: white;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🤖 AI Browser Assistant</h1>
    <div class="header-controls">
      <button class="debug-btn" id="debugBtn">🔧 调试</button>
      <span class="status" id="status">初始化中...</span>
    </div>
  </div>

  <div class="config-section">
    <div class="config-row">
      <label>Provider</label>
      <select id="providerSelect">
        <option value="">-- 选择提供商 --</option>
        <option value="openai">OpenAI</option>
        <option value="deepseek">DeepSeek</option>
        <option value="siliconflow">SiliconFlow (硅基流动)</option>
        <option value="ollama">Ollama (本地)</option>
        <option value="custom">自定义 API</option>
      </select>
    </div>

    <div class="config-row">
      <label>API Key</label>
      <input type="password" id="apiKey" placeholder="输入 API Key 或 Token">
    </div>

    <div class="config-row custom-endpoint" id="customEndpointRow">
      <label>API 端点</label>
      <input type="text" id="customEndpoint" placeholder="https://api.example.com/v1/chat/completions">
    </div>

    <div class="model-row">
      <label>Model</label>
      <select id="modelSelect" class="model-select" disabled>
        <option value="">-- 先填写配置 --</option>
      </select>
      <button class="refresh-models-btn" id="refreshModelsBtn" style="display:none;">🔄</button>
    </div>
  </div>

  <div class="context-banner" id="contextBanner">
    <div class="title" id="pageTitle">正在加载页面内容...</div>
    <div id="pageUrl" style="font-size: 10px; color: #666; overflow: hidden; text-overflow: ellipsis;"></div>
  </div>

  <div class="main-content">
    <div class="chat-container" id="chatContainer">
      <div class="message assistant">
        👋 你好！请先在顶部配置你的 AI API，然后就可以开始对话了。
      </div>
    </div>

    <div class="loading-indicator" id="loadingIndicator">
      <div class="spinner"></div>
      <span>AI 思考中...</span>
    </div>

    <div class="input-area">
      <div class="input-row">
        <textarea id="userInput" placeholder="输入你的问题..." rows="1"></textarea>
        <button class="send-btn" id="sendBtn">发送</button>
      </div>
    </div>
  </div>

  <div class="debug-modal" id="debugModal">
    <h3>📋 最近一次发送的上下文</h3>
    <div class="debug-content" id="debugContent"></div>
    <div class="debug-actions">
      <button class="close-btn" id="debugClose">关闭</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
